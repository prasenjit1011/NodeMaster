name: Deploy And Destroy

on:
  push:
    branches:
      - typescript_main_teraform_aws_kubernetes_demo

jobs:

  deploy:
    runs-on: ubuntu-latest

    # Entire workflow hard limit
    timeout-minutes: 55

    steps:

      # =========================
      # Checkout
      # =========================
      - name: Checkout
        timeout-minutes: 2
        uses: actions/checkout@v4

      # =========================
      # AWS
      # =========================
      - name: Configure AWS
        timeout-minutes: 2
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ap-south-1

      # =========================
      # Terraform
      # =========================
      - name: Setup Terraform
        timeout-minutes: 3
        uses: hashicorp/setup-terraform@v3

      - name: Clean Terraform Cache
        timeout-minutes: 2
        working-directory: terraform
        run: |
          rm -rf .terraform
          rm -f terraform.lock.hcl

      - name: Terraform Init
        timeout-minutes: 8
        working-directory: terraform
        run: terraform init -upgrade

      - name: Terraform Validate
        timeout-minutes: 3
        working-directory: terraform
        run: terraform validate

      - name: Terraform Plan
        timeout-minutes: 8
        working-directory: terraform
        run: terraform plan

      # EKS creation can take long
      - name: Terraform Apply
        timeout-minutes: 28
        working-directory: terraform
        run: terraform apply -auto-approve

      # =========================
      # kubectl
      # =========================
      - name: Setup kubectl
        timeout-minutes: 3
        uses: azure/setup-kubectl@v4

      - name: Connect EKS
        timeout-minutes: 5
        run: |
          aws eks update-kubeconfig \
            --region ap-south-1 \
            --name node-cluster

      # =========================
      # Secret
      # =========================
      - name: Replace ENV
        timeout-minutes: 2
        run: |
          export MONGO_URI="${{ secrets.MONGO_URI }}"
          envsubst < k8s/secret.yaml > k8s/secret-final.yaml

      - name: Apply Secret
        timeout-minutes: 3
        run: |
          kubectl apply -f k8s/secret-final.yaml

      # =========================
      # Docker + ECR
      # =========================
      - name: Login To ECR
        timeout-minutes: 3
        id: login-ecr
        uses: aws-actions/amazon-ecr-login@v2

      - name: Build Docker Image
        timeout-minutes: 10
        run: |
          docker build -t nodejs-k8s-app .

      - name: Tag Docker Image
        timeout-minutes: 2
        run: |
          docker tag nodejs-k8s-app:latest \
          ${{ steps.login-ecr.outputs.registry }}/nodejs-k8s-app:latest

      - name: Push Docker Image
        timeout-minutes: 10
        run: |
          docker push \
          ${{ steps.login-ecr.outputs.registry }}/nodejs-k8s-app:latest

      # =========================
      # Update Deployment Image
      # =========================
      - name: Update Deployment
        timeout-minutes: 2
        run: |
          IMAGE="${{ steps.login-ecr.outputs.registry }}/nodejs-k8s-app:latest"

          sed -i "s|IMAGE_NAME|$IMAGE|g" k8s/deployment.yaml

      # =========================
      # Deploy
      # =========================
      - name: Deploy To Kubernetes
        timeout-minutes: 5
        run: |
          kubectl apply -f k8s/deployment.yaml
          kubectl apply -f k8s/service.yaml

      # =========================
      # Show Service
      # =========================
      - name: Show Services
        timeout-minutes: 3
        run: |
          kubectl get pods
          kubectl get svc

      # =========================
      # Wait
      # =========================
      - name: Wait 1 Minute
        timeout-minutes: 2
        run: sleep 60

      # =========================
      # Cleanup Kubernetes
      # =========================
      - name: Delete Kubernetes Resources
        timeout-minutes: 8
        if: always()
        run: |
          kubectl delete -f k8s/service.yaml --ignore-not-found=true
          kubectl delete -f k8s/deployment.yaml --ignore-not-found=true
          kubectl delete -f k8s/secret-final.yaml --ignore-not-found=true

      # =========================
      # Terraform Destroy
      # =========================
      - name: Terraform Destroy
        timeout-minutes: 25
        if: always()
        working-directory: terraform
        run: terraform destroy -auto-approve