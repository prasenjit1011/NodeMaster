name: Deploy And Destroy

on:
  push:
    branches:
      - typescript_main_teraform_aws_kubernetes

jobs:

  deploy:
    runs-on: ubuntu-latest

    steps:

      - name: Checkout
        uses: actions/checkout@v4

      - name: Configure AWS
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ap-south-1

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3

      - name: Terraform Init
        working-directory: terraform
        run: terraform init

      - name: Terraform Apply
        working-directory: terraform
        run: terraform apply -auto-approve

      - name: Login To ECR
        id: login-ecr
        uses: aws-actions/amazon-ecr-login@v2

      - name: Build Docker Image
        run: docker build -t nodejs-k8s-app .

      - name: Tag Docker Image
        run: |
          docker tag nodejs-k8s-app:latest \
          ${{ steps.login-ecr.outputs.registry }}/nodejs-k8s-app:latest

      - name: Push Docker Image
        run: |
          docker push \
          ${{ steps.login-ecr.outputs.registry }}/nodejs-k8s-app:latest

      - name: Setup kubectl
        uses: azure/setup-kubectl@v4

      - name: Connect EKS
        run: |
          aws eks update-kubeconfig \
          --region ap-south-1 \
          --name node-cluster

      - name: Update Deployment
        run: |
          sed -i 's|IMAGE_NAME|${{ steps.login-ecr.outputs.registry }}/nodejs-k8s-app:latest|g' k8s/deployment.yaml

      - name: Deploy To Kubernetes
        run: |
          kubectl apply -f k8s/deployment.yaml
          kubectl apply -f k8s/service.yaml

      # =========================
      # Show Service URL
      # =========================
      - name: Show LoadBalancer URL
        run: kubectl get svc

      - name: Wait 7 Minutes
        run: sleep 420

      - name: Delete Kubernetes Resources
        run: |
          kubectl delete -f k8s/service.yaml --ignore-not-found
          kubectl delete -f k8s/deployment.yaml --ignore-not-found

      - name: Terraform Destroy
        working-directory: terraform
        run: terraform destroy -auto-approve