name: Deploy And Auto Destroy

on:
  push:
    branches:
      - typescript_main_teraform_aws

jobs:
  terraform:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: terraform

    outputs:
      server_ip: ${{ steps.tf_outputs.outputs.server_ip }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Configure AWS Credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ap-south-1

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3

      - name: Terraform Init
        run: terraform init

      - name: Terraform Apply
        run: terraform apply -auto-approve

      - name: Get Terraform Outputs
        id: tf_outputs
        run: |
          echo "server_ip=$(terraform output -raw server_ip)" >> $GITHUB_OUTPUT

  deploy:
    needs: terraform
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Create SSH Folder
        run: |
          mkdir -p ~/.ssh

      - name: Add SSH Key
        run: |
          echo "${{ secrets.EC2_SSH_KEY }}" > ~/.ssh/node-key.pem
          chmod 600 ~/.ssh/node-key.pem

      - name: Wait For EC2
        run: |
          sleep 60

      - name: Test SSH Connection
        run: |
          ssh -o StrictHostKeyChecking=no \
          -i ~/.ssh/node-key.pem \
          ubuntu@${{ needs.terraform.outputs.server_ip }} \
          "echo Connected"

      - name: Deploy Node App
        run: |
          ssh -o StrictHostKeyChecking=no \
          -i ~/.ssh/node-key.pem \
          ubuntu@${{ needs.terraform.outputs.server_ip }} << 'EOF'
            sudo apt update
            sudo apt install -y nodejs npm git

            rm -rf app
            git clone YOUR_GITHUB_REPO_URL app
            cd app
            npm install
            nohup node server.js > app.log 2>&1 &
          EOF