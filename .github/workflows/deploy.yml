name: Deploy Employee System

on:
  push:
    branches:
      - typescript_main_teraform_aws_lambda_step_fn

jobs:
  deploy:
    runs-on: ubuntu-latest
    timeout-minutes: 45

    env:
      AWS_REGION: ${{ secrets.AWS_REGION }}
      TF_VAR_mongo_uri: ${{ secrets.MONGO_URI }}
      TF_VAR_aws_region: ${{ secrets.AWS_REGION }}
      TF_VAR_jwt_secret: ${{ secrets.JWT_SECRET }}

    steps:

      ##################################################
      # CHECKOUT
      ##################################################

      - name: Checkout Source
        uses: actions/checkout@v4

      ##################################################
      # NODEJS
      ##################################################

      - name: Setup NodeJS
        uses: actions/setup-node@v4
        with:
          node-version: 20

      ##################################################
      # TERRAFORM
      ##################################################

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3

      ##################################################
      # AWS LOGIN
      ##################################################

      - name: Configure AWS Credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ secrets.AWS_REGION }}


      - name: Install ZIP
        run: sudo apt-get update && sudo apt-get install -y zip

      ##################################################
      # BUILD ALL LAMBDAS
      ##################################################

      - name: Build Lambda Packages
        timeout-minutes: 20
        run: |
          set -e

          rm -rf zips
          mkdir -p zips

          for dir in lambdas/*; do

            if [ -d "$dir" ]; then

              LAMBDA_NAME=$(basename "$dir")

              echo "========================================="
              echo "Building Lambda: $LAMBDA_NAME"
              echo "========================================="

              cd "$dir"

              if [ -f package-lock.json ]; then
                npm ci --omit=dev
              else
                npm ci --omit=dev
              fi

              zip -r "../../zips/${LAMBDA_NAME}.zip" \
                index.js \
                node_modules \
                package.json \
                -x "*.map" \
                -x "*.md" \
                -x "*.log" \
                -x "node_modules/aws-sdk/apis/*" \
                -x "node_modules/aws-sdk/dist/*" \
                -x "node_modules/.cache/*"

              echo "ZIP CREATED:"
              ls -lh ../../zips/${LAMBDA_NAME}.zip

              cd ../..
            fi

          done


      ##################################################
      # VERIFY ZIP FILES
      ##################################################

      - name: Verify ZIP Files
        run: |
          echo "========================================="
          echo "Generated ZIP Files"
          echo "========================================="

          ls -lh zips/

      ##################################################
      # TEST MONGODB CONNECTION
      ##################################################

      - name: Test MongoDB Connection
        timeout-minutes: 5
        run: |
          mkdir -p mongo-test
          cd mongo-test

          npm init -y > /dev/null 2>&1
          npm install mongodb > /dev/null 2>&1

          cat > test.js << 'EOF'
          const { MongoClient } = require('mongodb');

          async function testConnection() {
            try {
              console.log('Connecting to MongoDB...');

              const client = new MongoClient(
                process.env.TF_VAR_mongo_uri,
                {
                  serverSelectionTimeoutMS: 10000,
                  connectTimeoutMS: 10000,
                  socketTimeoutMS: 10000
                }
              );

              await client.connect();

              console.log('MongoDB Connection Successful');

              const db = client.db('demodb');

              console.log('Connected Database:', db.databaseName);

              await client.close();

              process.exit(0);

            } catch (error) {

              console.error('MongoDB Connection Failed');
              console.error(error);

              process.exit(1);
            }
          }

          testConnection();
          EOF

          node test.js

      ##################################################
      # TERRAFORM INIT
      ##################################################

      - name: Terraform Init
        working-directory: terraform
        timeout-minutes: 10
        run: terraform init

      ##################################################
      # TERRAFORM VALIDATE
      ##################################################

      - name: Terraform Validate
        working-directory: terraform
        timeout-minutes: 5
        run: terraform validate

      ##################################################
      # TERRAFORM PLAN
      ##################################################

      - name: Terraform Plan
        working-directory: terraform
        timeout-minutes: 10
        run: terraform plan -out=tfplan

      ##################################################
      # TERRAFORM APPLY
      ##################################################

      - name: Terraform Apply
        working-directory: terraform
        timeout-minutes: 20
        run: terraform apply -auto-approve tfplan

      ##################################################
      # SHOW OUTPUTS
      ##################################################

      - name: Terraform Outputs
        working-directory: terraform
        run: |
          echo "========================================="
          echo "Terraform Outputs"
          echo "========================================="

          terraform output