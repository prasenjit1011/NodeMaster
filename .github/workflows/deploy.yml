name: Terraform GCP Full Deploy

on:
  push:
    branches:
      - typescript_main_teraform_gcp

  workflow_dispatch:

jobs:

  # =========================
  # 1. BOOTSTRAP JOB
  # =========================
  bootstrap:
    name: Bootstrap Backend
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Authenticate to GCP
        uses: google-github-actions/auth@v2
        with:
          credentials_json: ${{ secrets.GCP_CREDENTIALS }}

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3

      - name: Terraform Init (Bootstrap)
        run: terraform -chdir=bootstrap init

      - name: Terraform Apply (Bootstrap)
        run: terraform -chdir=bootstrap apply -auto-approve
        env:
          TF_VAR_project_id: ${{ secrets.GCP_PROJECT_ID }}
          TF_VAR_region: us-central1
          TF_VAR_mongo_uri: ${{ secrets.MONGOURI_DEMODB }}

  # =========================
  # 2. DEPLOY INFRA
  # =========================
  deploy:
    name: Deploy Infrastructure
    runs-on: ubuntu-latest
    needs: bootstrap

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Authenticate to GCP
        uses: google-github-actions/auth@v2
        with:
          credentials_json: ${{ secrets.GCP_CREDENTIALS }}

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3

      - name: Terraform Init
        run: terraform -chdir=terraform init -migrate-state

      - name: Terraform Plan
        run: terraform -chdir=terraform plan
        env:
          TF_VAR_project_id: ${{ secrets.GCP_PROJECT_ID }}
          TF_VAR_region: us-central1
        TF_VAR_mongo_uri: ${{ secrets.MONGOURI_DEMODB }}

      - name: Terraform Apply
        run: terraform -chdir=terraform apply -auto-approve
        env:
          TF_VAR_project_id: ${{ secrets.GCP_PROJECT_ID }}
          TF_VAR_region: us-central1
          TF_VAR_mongo_uri: ${{ secrets.MONGOURI_DEMODB }}

  # =========================
  # 3. AUTO DESTROY
  # =========================
  destroy:
    name: Destroy Infrastructure After 60 Min
    runs-on: ubuntu-latest
    needs: deploy

    steps:
      - name: Wait 5 minutes
        run: sleep 300

      - name: Checkout code
        uses: actions/checkout@v4

      - name: Authenticate to GCP
        uses: google-github-actions/auth@v2
        with:
          credentials_json: ${{ secrets.GCP_CREDENTIALS }}

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3

      - name: Terraform Init
        run: terraform -chdir=terraform init

      - name: Terraform Destroy
        run: terraform -chdir=terraform destroy -auto-approve
        env:
          TF_VAR_project_id: ${{ secrets.GCP_PROJECT_ID }}
          TF_VAR_region: us-central1