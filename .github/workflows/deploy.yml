name: Deploy And Auto Destroy

on:
  push:
    branches:
      - typescript_main_teraform_aws

jobs:
  terraform:
    runs-on: ubuntu-latest

    defaults:
      run:
        working-directory: terraform

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Configure AWS Credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ap-south-1

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3

      - name: Terraform Init
        run: terraform init

      - name: Terraform Validate
        run: terraform validate

      - name: Terraform Plan
        env:
          TF_VAR_key_name: ${{ secrets.EC2_KEY_NAME }}
        run: terraform plan

      - name: Terraform Apply
        env:
          TF_VAR_key_name: ${{ secrets.EC2_KEY_NAME }}
        run: terraform apply -auto-approve

      - name: Get Terraform Outputs
        id: ec2
        run: |
          echo "server_ip=$(terraform output -raw server_ip)" >> $GITHUB_OUTPUT
          echo "instance_id=$(terraform output -raw instance_id)" >> $GITHUB_OUTPUT

      - name: Add SSH key
        run: |
          mkdir -p ~/.ssh
          echo "${{ secrets.SSH_PRIVATE_KEY }}" > ~/.ssh/id_rsa
          chmod 600 ~/.ssh/id_rsa

      - name: Wait for SSH
        run: |
          for i in {1..30}; do
            ssh -o StrictHostKeyChecking=no \
                -o ConnectTimeout=10 \
                -i ~/.ssh/id_rsa \
                ubuntu@${{ steps.ec2.outputs.server_ip }} "echo SSH OK" && break

            echo "SSH not ready yet..."
            sleep 10
          done

      - name: Create app directory
        run: |
          ssh -o StrictHostKeyChecking=no \
              -i ~/.ssh/id_rsa \
              ubuntu@${{ steps.ec2.outputs.server_ip }} \
              "mkdir -p ~/app"

      - name: Copy repository to EC2
        run: |
          scp -o StrictHostKeyChecking=no \
              -i ~/.ssh/id_rsa \
              -r $GITHUB_WORKSPACE/* \
              ubuntu@${{ steps.ec2.outputs.server_ip }}:~/app

      - name: Install Node and Start App
        run: |
          ssh -o StrictHostKeyChecking=no \
              -i ~/.ssh/id_rsa \
              ubuntu@${{ steps.ec2.outputs.server_ip }} << 'EOF'

          sudo apt update -y
          sudo apt install -y nodejs npm

          cd ~/app || exit 1

          npm install

          sudo npm install -g pm2

          pm2 delete node_app || true
          pm2 start server.js --name node_app
          pm2 save

          EOF

      - name: Show App URL
        run: |
          echo "App URL:"
          echo "http://${{ steps.ec2.outputs.server_ip }}:3000"

      - name: Wait Before Destroy
        run: sleep 420

      - name: Terraform Destroy
        env:
          TF_VAR_key_name: ${{ secrets.EC2_KEY_NAME }}
        run: terraform destroy -auto-approve