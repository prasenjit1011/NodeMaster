name: deploy

on:
  push:
    branches: [terraform_aws_lambda_step_fn_leave_approval_workflow]

jobs:
  deploy:
    runs-on: ubuntu-latest

    env:
      AWS_ACCESS_KEY_ID: ${{ secrets.AWS_ACCESS_KEY_ID }}
      AWS_SECRET_ACCESS_KEY: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
      AWS_REGION: ${{ secrets.AWS_REGION }}

      TF_VAR_mongo_uri: ${{ secrets.MONGO_URI }}

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      # ==========================================
      # BUILD LAMBDA ZIP FILES
      # ==========================================

      - name: Build Lambda Packages
        run: |
          mkdir -p build

          cd lambdas/validateLeave
          npm install --production
          zip -r ../../build/validateLeave.zip .
          cd ../..

          cd lambdas/createLeave
          npm install --production
          zip -r ../../build/createLeave.zip .
          cd ../..

          cd lambdas/managerApproval
          npm install --production
          zip -r ../../build/managerApproval.zip .
          cd ../..

          cd lambdas/hrApproval
          npm install --production
          zip -r ../../build/hrApproval.zip .
          cd ../..

          cd lambdas/updateBalance
          npm install --production
          zip -r ../../build/updateBalance.zip .
          cd ../..

          cd lambdas/sendEmail
          npm install --production
          zip -r ../../build/sendEmail.zip .
          cd ../..

          cd lambdas/stepfnInvoker
          npm install --production
          zip -r ../../build/stepfnInvoker.zip .
          cd ../..

      # ==========================================
      # TERRAFORM
      # ==========================================

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3

      - name: Terraform Init
        working-directory: infra
        run: terraform init -reconfigure

      - name: Terraform Validate
        working-directory: infra
        run: terraform validate

      - name: Terraform Version
        run: |
          terraform version

      - name: Check AWS Access
        run: |
          aws sts get-caller-identity
          aws configure list

      - name: Terraform State List
        run: terraform state list || true

      - name: Terraform Plan
        working-directory: infra
        run: terraform plan        
        env:
          TF_LOG: INFO


      - name: Terraform Apply
        working-directory: infra
        run: terraform apply -auto-approve -input=false

      # ==========================================
      # OUTPUTS
      # ==========================================

      - name: Show API Gateway URL
        working-directory: infra
        run: terraform output -raw api_gateway_url

      - name: Show API Gateway URL with Endpoint
        working-directory: infra
        run: |
          echo ""
          echo "===================================="
          echo "Employee Leave API URL"
          echo "===================================="
          echo "$(terraform output -raw api_gateway_url)/leave/apply"
          echo "===================================="

      - name: Show API Gateway URL Endpoint
        working-directory: infra
        run: |
          echo "API URL:"
          echo "$(terraform output -raw api_gateway_url)/leave/apply"