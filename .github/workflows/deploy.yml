name: Terraform GCP Full Deploy

on:
  push:
    branches:
      - typescript_main_teraform_gcp

  workflow_dispatch:

jobs:

  # =========================
  # 1. BOOTSTRAP JOB
  # =========================
  bootstrap:
    name: Bootstrap Backend
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      # =========================
      # GCP AUTH
      # =========================
      - name: Authenticate to GCP
        uses: google-github-actions/auth@v2
        with:
          credentials_json: ${{ secrets.GCP_CREDENTIALS }}

      # =========================
      # TERRAFORM
      # =========================
      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3

      # =========================
      # TERRAFORM INIT
      # =========================
      - name: Terraform Init (Bootstrap)
        run: terraform -chdir=bootstrap init

      # =========================
      # TERRAFORM APPLY
      # =========================
      - name: Terraform Apply (Bootstrap)
        run: terraform -chdir=bootstrap apply -auto-approve
        env:
          TF_VAR_project_id: ${{ secrets.GCP_PROJECT_ID }}
          TF_VAR_region: us-central1
          TF_VAR_mongo_uri: ${{ secrets.MONGO_URI }}

  # =========================
  # 2. DEPLOY INFRA
  # =========================
  deploy:
    name: Deploy Infrastructure
    runs-on: ubuntu-latest
    needs: bootstrap

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      # =========================
      # GCP AUTH
      # =========================
      - name: Authenticate to GCP
        uses: google-github-actions/auth@v2
        with:
          credentials_json: ${{ secrets.GCP_CREDENTIALS }}

      # =========================
      # TERRAFORM
      # =========================
      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3

      # =========================
      # TERRAFORM INIT
      # =========================
      - name: Terraform Init
        run: terraform -chdir=terraform init -migrate-state

      # =========================
      # TERRAFORM VALIDATE
      # =========================
      - name: Terraform Validate
        run: terraform -chdir=terraform validate

      # =========================
      # TERRAFORM PLAN
      # =========================
      - name: Terraform Plan
        run: terraform -chdir=terraform plan
        env:
          TF_VAR_project_id: ${{ secrets.GCP_PROJECT_ID }}
          TF_VAR_region: us-central1
          TF_VAR_mongo_uri: ${{ secrets.MONGO_URI }}

      # =========================
      # TERRAFORM APPLY
      # =========================
      - name: Terraform Apply
        run: terraform -chdir=terraform apply -auto-approve
        env:
          TF_VAR_project_id: ${{ secrets.GCP_PROJECT_ID }}
          TF_VAR_region: us-central1
          TF_VAR_mongo_uri: ${{ secrets.MONGO_URI }}

      # =========================
      # PRINT TERRAFORM OUTPUTS
      # =========================
      - name: Print Terraform Outputs
        run: |
          echo "================================="
          echo " TERRAFORM OUTPUTS "
          echo "================================="

          terraform -chdir=terraform output

          echo ""
          echo "================================="
          echo " LOAD BALANCER INFO "
          echo "================================="

          echo "Load Balancer IP:"
          terraform -chdir=terraform output -raw load_balancer_ip

          echo ""

          echo "Load Balancer URL:"
          terraform -chdir=terraform output -raw load_balancer_url

      # =========================
      # EXPORT OUTPUTS
      # =========================
      - name: Export Load Balancer Variables
        run: |
          LB_IP=$(terraform -chdir=terraform output -raw load_balancer_ip)
          LB_URL=$(terraform -chdir=terraform output -raw load_balancer_url)

          echo "LB_IP=$LB_IP" >> $GITHUB_ENV
          echo "LB_URL=$LB_URL" >> $GITHUB_ENV

          echo ""
          echo "================================="
          echo " EXPORTED VARIABLES "
          echo "================================="
          echo "LB_IP=$LB_IP"
          echo "LB_URL=$LB_URL"

      # =========================
      # WAIT FOR LB HEALTH CHECK
      # =========================
      - name: Wait For Load Balancer
        run: |
          echo "Waiting 60 seconds for Load Balancer health checks..."
          sleep 60

      # =========================
      # TEST LOAD BALANCER
      # =========================
      - name: Test Load Balancer
        run: |
          echo "================================="
          echo " TESTING LOAD BALANCER "
          echo "================================="

          echo "URL: $LB_URL"

          curl -I $LB_URL || true
        env:
          LB_URL: ${{ env.LB_URL }}

      # =========================
      # PRINT LOAD BALANCER INFO
      # =========================
      - name: Show Load Balancer
        run: |
          echo "================================="
          echo " LOAD BALANCER "
          echo "================================="

          echo "LB_IP=${{ env.LB_IP }}"
          echo "LB_URL=${{ env.LB_URL }}"


      # # =========================
      # # RUN NODE SERVER
      # # =========================
      # - name: Run Node Server
      #   env:
      #     LB_IP: ${{ env.LB_IP }}
      #     LB_URL: ${{ env.LB_URL }}
      #   run: |
      #     echo "================================="
      #     echo " RUN NODE SERVER "
      #     echo "================================="

      #     echo "LB_IP=$LB_IP"
      #     echo "LB_URL=$LB_URL"

      #     node dist/app.js

  # =========================
  # 3. AUTO DESTROY
  # =========================
  destroy:
    name: Auto-Destroy Resources After 5 Minutes
    runs-on: ubuntu-latest
    needs: deploy

    steps:

      # =========================
      # WAIT
      # =========================
      - name: Wait 5 Minutes Before Destruction
        run: |
          echo "================================="
          echo " WAITING BEFORE DESTROY "
          echo "================================="

          echo "Resources will be destroyed in 5 minutes..."
          echo "Destroy Time: $(date -u -d '+300 seconds' +'%Y-%m-%d %H:%M:%S UTC')"

          sleep 300

      # =========================
      # CHECKOUT
      # =========================
      - name: Checkout code
        uses: actions/checkout@v4

      # =========================
      # GCP AUTH
      # =========================
      - name: Authenticate to GCP
        uses: google-github-actions/auth@v2
        with:
          credentials_json: ${{ secrets.GCP_CREDENTIALS }}

      # =========================
      # TERRAFORM
      # =========================
      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3

      # =========================
      # INIT TERRAFORM
      # =========================
      - name: Terraform Init (Terraform Folder)
        run: terraform -chdir=terraform init -migrate-state

      # =========================
      # DESTROY MAIN INFRA
      # =========================
      - name: Terraform Destroy (Infrastructure)
        run: terraform -chdir=terraform destroy -auto-approve -lock=false
        env:
          TF_VAR_project_id: ${{ secrets.GCP_PROJECT_ID }}
          TF_VAR_region: us-central1
          TF_VAR_mongo_uri: ${{ secrets.MONGO_URI }}

      # =========================
      # INIT BOOTSTRAP
      # =========================
      - name: Terraform Init (Bootstrap Folder)
        run: terraform -chdir=bootstrap init -migrate-state

      # =========================
      # DESTROY BOOTSTRAP
      # =========================
      - name: Terraform Destroy (Bootstrap)
        run: terraform -chdir=bootstrap destroy -auto-approve -lock=false
        env:
          TF_VAR_project_id: ${{ secrets.GCP_PROJECT_ID }}
          TF_VAR_region: us-central1

      # =========================
      # COMPLETE
      # =========================
      - name: Destruction Complete
        run: |
          echo "================================="
          echo " ALL RESOURCES DESTROYED "
          echo "================================="

          echo "Completed At: $(date -u +'%Y-%m-%d %H:%M:%S UTC')"
          echo "Charges stopped successfully."