name: Deploy And Auto Destroy

on:
  push:
    branches:
      - typescript_main_teraform_aws

jobs:
  terraform:
    runs-on: ubuntu-latest

    defaults:
      run:
        working-directory: terraform

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Configure AWS Credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ap-south-1

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3

      - name: Terraform Init
        run: terraform init

      - name: Terraform Validate
        run: terraform validate

      - name: Terraform Plan
        env:
          TF_VAR_key_name: ${{ secrets.EC2_KEY_NAME }}
        run: terraform plan

      - name: Terraform Apply
        env:
          TF_VAR_key_name: ${{ secrets.EC2_KEY_NAME }}
        run: terraform apply -auto-approve

      - name: Get Terraform Outputs
        id: ec2
        run: |
          echo "server_ip=$(terraform output -raw server_ip)" >> $GITHUB_OUTPUT
          echo "instance_id=$(terraform output -raw instance_id)" >> $GITHUB_OUTPUT

      - name: Setup SSH Key
        run: |
          mkdir -p ~/.ssh

          printf "%s" "${{ secrets.SSH_PRIVATE_KEY }}" > ~/.ssh/id_rsa

          chmod 600 ~/.ssh/id_rsa

          ssh-keyscan -H ${{ steps.ec2.outputs.server_ip }} >> ~/.ssh/known_hosts

      - name: Debug SSH Key
        run: |
          file ~/.ssh/id_rsa
          head -n 2 ~/.ssh/id_rsa

      - name: Wait For EC2 SSH
        run: |
          for i in {1..30}; do

            ssh \
              -o StrictHostKeyChecking=no \
              -o ConnectTimeout=10 \
              -i ~/.ssh/id_rsa \
              ubuntu@${{ steps.ec2.outputs.server_ip }} "echo SSH Connected"

            if [ $? -eq 0 ]; then
              echo "SSH is ready"
              break
            fi

            echo "Waiting for SSH..."
            sleep 10

          done

      - name: Create App Directory
        run: |
          ssh \
            -o StrictHostKeyChecking=no \
            -i ~/.ssh/id_rsa \
            ubuntu@${{ steps.ec2.outputs.server_ip }} \
            "mkdir -p ~/app"

      - name: Copy Project To EC2
        run: |
          scp \
            -o StrictHostKeyChecking=no \
            -i ~/.ssh/id_rsa \
            -r ../* \
            ubuntu@${{ steps.ec2.outputs.server_ip }}:~/app

      - name: Install NodeJS And Start App
        run: |
          ssh \
            -o StrictHostKeyChecking=no \
            -i ~/.ssh/id_rsa \
            ubuntu@${{ steps.ec2.outputs.server_ip }} << 'EOF'

          sudo apt update -y

          curl -fsSL https://deb.nodesource.com/setup_18.x | sudo -E bash -

          sudo apt install -y nodejs

          node -v
          npm -v

          cd ~/app || exit 1

          npm install

          sudo npm install -g pm2

          pm2 delete node_app || true

          pm2 start server.js --name node_app

          pm2 save

          pm2 status

          EOF

      - name: Verify Files On EC2
        run: |
          ssh \
            -o StrictHostKeyChecking=no \
            -i ~/.ssh/id_rsa \
            ubuntu@${{ steps.ec2.outputs.server_ip }} \
            "cd ~/app && ls -la"

      - name: Show Application URL
        run: |
          echo "Application URL:"
          echo "http://${{ steps.ec2.outputs.server_ip }}:3000"

      - name: Wait Before Destroy
        run: sleep 420

      - name: Terraform Destroy
        env:
          TF_VAR_key_name: ${{ secrets.EC2_KEY_NAME }}
        run: terraform destroy -auto-approve

      - name: Verify Destroy
        run: terraform output || true