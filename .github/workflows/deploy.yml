name: Deploy And Auto Destroy

on:
  push:
    branches:
      - terraform_aws_loadbalancer

jobs:

  terraform:
    runs-on: ubuntu-latest

    defaults:
      run:
        working-directory: terraform

    outputs:
      server_ips: ${{ steps.tf_outputs.outputs.server_ips }}
      load_balancer_dns: ${{ steps.tf_outputs.outputs.load_balancer_dns }}

    steps:
      # ==============================
      # Checkout
      # ==============================
      - name: Checkout Repository
        uses: actions/checkout@v4

      # ==============================
      # AWS Credentials
      # ==============================
      - name: Configure AWS Credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ap-south-1

      # ==============================
      # Terraform Setup
      # ==============================
      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3

      # ==============================
      # Terraform Init
      # ==============================
      - name: Terraform Init
        run: terraform init

      # ==============================
      # Terraform Validate
      # ==============================
      - name: Terraform Validate
        run: terraform validate

      # ==============================
      # Terraform Apply
      # ==============================
      - name: Terraform Apply
        run: terraform apply -auto-approve

      # ==============================
      # Save Terraform State
      # ==============================
      - name: Save Terraform State
        uses: actions/upload-artifact@v4
        with:
          name: terraform-state
          path: |
            terraform/terraform.tfstate
            terraform/terraform.tfstate.backup

      # ==============================
      # Terraform Outputs
      # ==============================
      - name: Get Terraform Outputs
        id: tf_outputs
        run: |
          echo "server_ips=$(terraform output -json server_ips | jq -c .)" >> "$GITHUB_OUTPUT"
          echo "load_balancer_dns=$(terraform output -raw load_balancer_dns)" >> "$GITHUB_OUTPUT"

      # ==============================
      # Show Load Balancer URL
      # ==============================
      - name: Show Load Balancer URL
        run: |
          echo "======================================"
          echo "APPLICATION URL"
          echo "http://${{ steps.tf_outputs.outputs.load_balancer_dns }}/server"
          echo "======================================"

      - name: Show Infrastructure URLs
        run: |
          echo "======================================"
          echo "LOAD BALANCER"
          echo "http://${{ steps.tf_outputs.outputs.load_balancer_dns }}/server"
          echo ""

          echo "EC2 SERVERS"
          echo '${{ steps.tf_outputs.outputs.server_ips }}'
          echo "======================================"


  deploy:
    needs: terraform
    runs-on: ubuntu-latest

    strategy:
      matrix:
        server_ip: ${{ fromJson(needs.terraform.outputs.server_ips) }}

    steps:
      # ==============================
      # Checkout
      # ==============================
      - name: Checkout Repository
        uses: actions/checkout@v4

      # ==============================
      # SSH Folder
      # ==============================
      - name: Create SSH Directory
        run: mkdir -p ~/.ssh

      # ==============================
      # Write PEM Key
      # ==============================
      - name: Write PEM Key
        run: |
          echo "${{ secrets.EC2_SSH_KEY }}" > ~/.ssh/node-key.pem
          chmod 400 ~/.ssh/node-key.pem

      # ==============================
      # Verify PEM File
      # ==============================
      - name: Verify PEM File
        run: |
          ls -la ~/.ssh
          head -n 2 ~/.ssh/node-key.pem

      # ==============================
      # Wait For EC2
      # ==============================
      - name: Wait For EC2 Boot
        run: sleep 90

      # ==============================
      # Test SSH
      # ==============================
      - name: Test SSH Connection
        run: |
          ssh -o StrictHostKeyChecking=no \
            -i ~/.ssh/node-key.pem \
            ubuntu@${{ matrix.server_ip }} \
            "echo SSH Connected"

      # ==============================
      # Deploy Node.js App
      # ==============================
      - name: Deploy Application

        env:
          MONGO_URI: ${{ secrets.MONGO_URI }}
          GITHUB_USERNAME: ${{ secrets.GH_USERNAME }}
          GITHUB_TOKEN: ${{ secrets.GH_TOKEN }}

        run: |
          ssh -o StrictHostKeyChecking=no \
            -i ~/.ssh/node-key.pem \
            ubuntu@${{ matrix.server_ip }} << EOF

          set -e

          export MONGO_URI="${MONGO_URI}"
          export GITHUB_USERNAME="${GITHUB_USERNAME}"
          export GITHUB_TOKEN="${GITHUB_TOKEN}"

          sudo apt update

          curl -fsSL https://deb.nodesource.com/setup_22.x | sudo -E bash -

          sudo apt install -y nodejs git

          sudo npm install -g pm2 typescript ts-node ts-node-dev

          cd /home/ubuntu

          # Remove old app
          rm -rf app

          # Clone Repository
          git clone -b terraform_aws_loadbalancer \
          https://${GITHUB_USERNAME}:${GITHUB_TOKEN}@github.com/prasenjit1011/NodeMaster.git app

          cd app

          git fetch origin

          git reset --hard origin/terraform_aws_loadbalancer

          rm -rf node_modules package-lock.json

          npm install

          npm install dotenv

          npm install --save-dev \
            ts-node-dev \
            ts-node \
            typescript \
            @types/node

          # Create .env
          cat > .env << ENVEOF
          MONGO_URI=${MONGO_URI}
          PORT=3000
          USERNAME=${GITHUB_USERNAME}
          TOKEN=${GITHUB_TOKEN}
          ENVEOF

          echo "=========== .env FILE =========="
          cat .env

          pm2 delete app || true

          pm2 start npm --name "app" -- run dev

          pm2 save

          pm2 status

          echo "Application Started Successfully"

          EOF

      - name: Show Application URLs
        run: |
          echo ""
          echo "===================================="
          echo "Application URLs"
          echo "===================================="

          echo "Load Balancer URL:"
          echo "http://${{ steps.tf_outputs.outputs.load_balancer_dns }}"
          echo ""

          IFS=',' read -ra IPS <<< "${{ steps.tf_outputs.outputs.server_ips }}"

          echo "Server 1 URL:"
          echo "http://${IPS[0]}:3000/server"
          echo ""

          echo "Server 2 URL:"
          echo "http://${IPS[1]}:3000/server"
          echo ""

          echo "===================================="

  auto-destroy:
    if: always()
    needs: [terraform, deploy]
    runs-on: ubuntu-latest

    defaults:
      run:
        working-directory: terraform

    steps:
      # ==============================
      # Checkout
      # ==============================
      - name: Checkout Repository
        uses: actions/checkout@v4

      # ==============================
      # Download Terraform State
      # ==============================
      - name: Download Terraform State
        uses: actions/download-artifact@v4
        with:
          name: terraform-state
          path: terraform/

      # ==============================
      # AWS Credentials
      # ==============================
      - name: Configure AWS Credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ap-south-1

      # ==============================
      # Setup Terraform
      # ==============================
      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3

      # ==============================
      # Terraform Init
      # ==============================
      - name: Terraform Init
        run: terraform init

      # ==============================
      # Show Terraform Resources
      # ==============================
      - name: Terraform State List
        run: terraform state list || true

      # ==============================
      # Wait 7 Minutes
      # ==============================
      - name: Wait 7 Minutes
        run: |
          echo "Infrastructure will be destroyed in 7 minutes"
          sleep 420

      # ==============================
      # Terraform Destroy
      # ==============================
      - name: Terraform Destroy
        run: terraform destroy -auto-approve

      # ==============================
      # Force Delete AWS Resources
      # ==============================
      - name: Delete AWS Resources
        run: |

          echo "Deleting Load Balancers..."
          aws elbv2 describe-load-balancers \
          --query "LoadBalancers[*].LoadBalancerArn" \
          --output text | xargs -n1 -I {} \
          aws elbv2 delete-load-balancer --load-balancer-arn {}

          echo "Deleting NAT Gateways..."
          aws ec2 describe-nat-gateways \
          --query "NatGateways[*].NatGatewayId" \
          --output text | xargs -n1 -I {} \
          aws ec2 delete-nat-gateway --nat-gateway-id {}

          echo "Releasing Elastic IPs..."
          aws ec2 describe-addresses \
          --query "Addresses[*].AllocationId" \
          --output text | xargs -n1 -I {} \
          aws ec2 release-address --allocation-id {}

          echo "Deleting RDS Databases..."
          aws rds describe-db-instances \
          --query "DBInstances[*].DBInstanceIdentifier" \
          --output text | xargs -n1 -I {} \
          aws rds delete-db-instance \
            --db-instance-identifier {} \
            --skip-final-snapshot

          echo "Deleting Subnets..."
          aws ec2 describe-subnets \
          --query "Subnets[*].SubnetId" \
          --output text | xargs -n1 -I {} \
          aws ec2 delete-subnet --subnet-id {}

          echo "AWS Resource Cleanup Completed"