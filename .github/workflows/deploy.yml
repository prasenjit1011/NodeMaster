name: Deploy And Auto Destroy

on:
  push:
    branches:
      - typescript_main_teraform_aws

jobs:

  terraform:
    runs-on: ubuntu-latest

    defaults:
      run:
        working-directory: terraform

    outputs:
      server_ip: ${{ steps.tf_outputs.outputs.server_ip }}

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Configure AWS Credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ap-south-1

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3

      - name: Terraform Init
        run: terraform init

      - name: Terraform Validate
        run: terraform validate

      - name: Terraform Apply
        run: terraform apply -auto-approve

      - name: Save Terraform State
        uses: actions/upload-artifact@v4
        with:
          name: terraform-state
          path: |
            terraform/terraform.tfstate
            terraform/terraform.tfstate.backup

      - name: Get Terraform Outputs
        id: tf_outputs
        run: |
          echo "server_ip=$(terraform output -raw server_ip)" >> $GITHUB_OUTPUT

  deploy:
    needs: terraform
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Create SSH Directory
        run: mkdir -p ~/.ssh

      - name: Write PEM Key
        run: |
          echo "${{ secrets.EC2_SSH_KEY }}" > ~/.ssh/node-key.pem
          chmod 600 ~/.ssh/node-key.pem

      - name: Verify PEM File
        run: |
          ls -la ~/.ssh
          head -n 2 ~/.ssh/node-key.pem

      - name: Wait For EC2 Boot
        run: sleep 90

      - name: Test SSH Connection
        run: |
          ssh -o StrictHostKeyChecking=no \
          -i ~/.ssh/node-key.pem \
          ubuntu@${{ needs.terraform.outputs.server_ip }} \
          "echo SSH Connected"

      - name: Deploy Application
        env:
          MONGO_URI: ${{ secrets.MONGO_URI }}
        run: |

          ssh -o StrictHostKeyChecking=no \
          -i ~/.ssh/node-key.pem \
          ubuntu@${{ needs.terraform.outputs.server_ip }} << EOF

            set -e

            sudo apt update

            curl -fsSL https://deb.nodesource.com/setup_22.x | sudo -E bash -

            sudo apt install -y nodejs git

            sudo npm install -g pm2 typescript ts-node ts-node-dev

            cd /home/ubuntu

            if [ ! -d "app" ]; then
              git clone -b typescript_main_teraform_aws \
              https://github.com/prasenjit1011/NodeMaster.git app
            fi

            cd app

            git fetch origin

            git reset --hard origin/typescript_main_teraform_aws

            rm -rf node_modules package-lock.json

            npm install

            npm install --save-dev ts-node-dev typescript ts-node

            export MONGO_URI="${MONGO_URI}"

            pm2 delete app || true

            pm2 start npm --name "app" -- run dev

            pm2 save

            pm2 status

            echo "Application Started Successfully"

          EOF

  auto-destroy:
    if: always()
    needs: [terraform, deploy]
    runs-on: ubuntu-latest

    defaults:
      run:
        working-directory: terraform

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Download Terraform State
        uses: actions/download-artifact@v4
        with:
          name: terraform-state
          path: terraform/

      - name: Configure AWS Credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ap-south-1

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3

      - name: Terraform Init
        run: terraform init

      - name: Show Terraform State
        run: terraform state list || true

      - name: Wait 7 Minutes
        run: |
          echo "Server running for 7 minutes..."
          sleep 420

      - name: Terraform Destroy
        run: terraform destroy -auto-approve