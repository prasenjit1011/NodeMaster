name: Deploy And Destroy

on:
  push:
    branches:
      - typescript_main_teraform_aws_kubernetes

jobs:

  deploy:
    runs-on: ubuntu-latest

    steps:

      # =========================
      # Checkout
      # =========================
      - name: Checkout
        uses: actions/checkout@v4

      # =========================
      # AWS
      # =========================
      - name: Configure AWS
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ap-south-1

      # =========================
      # Terraform
      # =========================
      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3

      - name: Terraform Init
        working-directory: terraform
        run: terraform init

      - name: Terraform Apply
        working-directory: terraform
        run: terraform apply -auto-approve

      # =========================
      # kubectl
      # =========================
      - name: Setup kubectl
        uses: azure/setup-kubectl@v4

      - name: Connect EKS
        run: |
          aws eks update-kubeconfig \
            --region ap-south-1 \
            --name node-cluster

      # =========================
      # Secret
      # =========================
      - name: Replace ENV
        run: |
          export MONGO_URI="${{ secrets.MONGO_URI }}"
          envsubst < k8s/secret.yaml > k8s/secret-final.yaml

      - name: Apply Secret
        run: |
          kubectl apply -f k8s/secret-final.yaml

      # =========================
      # Docker + ECR
      # =========================
      - name: Login To ECR
        id: login-ecr
        uses: aws-actions/amazon-ecr-login@v2

      - name: Build Docker Image
        run: |
          docker build -t nodejs-k8s-app .

      - name: Tag Docker Image
        run: |
          docker tag nodejs-k8s-app:latest \
          ${{ steps.login-ecr.outputs.registry }}/nodejs-k8s-app:latest

      - name: Push Docker Image
        run: |
          docker push \
          ${{ steps.login-ecr.outputs.registry }}/nodejs-k8s-app:latest

      # =========================
      # Update Deployment Image
      # =========================
      - name: Update Deployment
        run: |
          IMAGE="${{ steps.login-ecr.outputs.registry }}/nodejs-k8s-app:latest"

          sed -i "s|IMAGE_NAME|$IMAGE|g" k8s/deployment.yaml

      # =========================
      # Deploy
      # =========================
      - name: Deploy To Kubernetes
        run: |
          kubectl apply -f k8s/deployment.yaml
          kubectl apply -f k8s/service.yaml

      # =========================
      # Show Service
      # =========================
      - name: Show Services
        run: |
          kubectl get pods
          kubectl get svc

      # =========================
      # Wait
      # =========================
      - name: Wait 2 Minutes
        run: sleep 120

      # =========================
      # Cleanup Kubernetes
      # =========================
      - name: Delete Kubernetes Resources
        if: always()
        run: |
          kubectl delete -f k8s/service.yaml --ignore-not-found=true
          kubectl delete -f k8s/deployment.yaml --ignore-not-found=true
          kubectl delete -f k8s/secret-final.yaml --ignore-not-found=true

      # =========================
      # Terraform Destroy
      # =========================
      - name: Terraform Destroy
        if: always()
        working-directory: terraform
        run: terraform destroy -auto-approve