name: Deploy Employee System

on:
  push:
    branches:
      - typescript_main_teraform_aws_lambda_step_fn

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:

      - name: Checkout Source
        uses: actions/checkout@v4

      - name: Setup NodeJS
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3

      - name: Configure AWS Credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ secrets.AWS_REGION }}

      # LOGIN LAMBDA
      - name: Install Login Lambda Dependencies
        run: |
          cd lambdas/login
          npm install

      - name: Zip Login Lambda
        run: |
          cd lambdas/login
          zip -r ../../login.zip .

      # VALIDATE JWT
      - name: Install Validate JWT Dependencies
        run: |
          cd lambdas/validateJwt
          npm install

      - name: Zip Validate JWT Lambda
        run: |
          cd lambdas/validateJwt
          zip -r ../../validateJwt.zip .

      # CREATE EMPLOYEE
      - name: Install Create Employee Dependencies
        run: |
          cd lambdas/createEmployee
          npm install

      - name: Zip Create Employee Lambda
        run: |
          cd lambdas/createEmployee
          zip -r ../../createEmployee.zip .

      # UPLOAD IMAGE
      - name: Install Upload Image Dependencies
        run: |
          cd lambdas/uploadImage
          npm install

      - name: Zip Upload Image Lambda
        run: |
          cd lambdas/uploadImage
          zip -r ../../uploadImage.zip .

      # UPDATE EMPLOYEE
      - name: Install Update Employee Dependencies
        run: |
          cd lambdas/updateEmployee
          npm install

      - name: Zip Update Employee Lambda
        run: |
          cd lambdas/updateEmployee
          zip -r ../../updateEmployee.zip .

      # TERRAFORM
      - name: Terraform Init
        run: |
          cd terraform
          terraform init

      - name: Terraform Apply
        env:
          TF_VAR_mongo_url: ${{ secrets.MONGO_URI }}
        run: |
          cd terraform
          terraform apply -auto-approve
