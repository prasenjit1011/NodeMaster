name: Deploy And Auto Destroy

on:
  push:
    branches:
      - typescript_main_teraform_aws

jobs:
  terraform:
    runs-on: ubuntu-latest

    defaults:
      run:
        working-directory: terraform

    outputs:
      server_ip: ${{ steps.tf_outputs.outputs.server_ip }}

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Configure AWS Credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ap-south-1

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3

      - name: Terraform Init
        run: terraform init

      - name: Terraform Validate
        run: terraform validate

      - name: Terraform Apply
        run: terraform apply -auto-approve

      - name: Get Terraform Outputs
        id: tf_outputs
        run: |
          echo "server_ip=$(terraform output -raw server_ip)" >> $GITHUB_OUTPUT

  deploy:
    needs: terraform
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Create SSH Directory
        run: |
          mkdir -p ~/.ssh

      - name: Write PEM Key
        run: |
          cat << 'EOF' > ~/.ssh/node-key.pem
          ${{ secrets.EC2_SSH_KEY }}
          EOF

          chmod 600 ~/.ssh/node-key.pem

      - name: Verify PEM File
        run: |
          ls -la ~/.ssh
          head -n 2 ~/.ssh/node-key.pem

      - name: Wait For EC2 Boot
        run: |
          echo "Waiting for EC2 instance..."
          sleep 90

      - name: Test SSH Connection
        run: |
          ssh -o StrictHostKeyChecking=no \
          -i ~/.ssh/node-key.pem \
          ubuntu@${{ needs.terraform.outputs.server_ip }} \
          "echo SSH Connected Successfully"

      - name: Deploy Node.js App
        env:
          MONGO_URI: ${{ secrets.MONGO_URI }}
        run: |
          ssh -o StrictHostKeyChecking=no \
          -i ~/.ssh/node-key.pem \
          ubuntu@${{ needs.terraform.outputs.server_ip }} << 'EOF'

            sudo apt update

            curl -fsSL https://deb.nodesource.com/setup_22.x | sudo -E bash -

            sudo apt install -y nodejs git

            cd /home/ubuntu

            if [ ! -d "app/.git" ]; then
              rm -rf app

              git clone -b typescript_main_teraform_aws \
              https://github.com/prasenjit1011/NodeMaster.git app
            fi

            cd /home/ubuntu/app

            git fetch origin

            git reset --hard origin/typescript_main_teraform_aws

            rm -rf node_modules package-lock.json

            npm install --include=dev

            export MONGO_URI="${{ secrets.MONGO_URI }}"

            pkill node || true

            nohup npm run dev > /home/ubuntu/app/app.log 2>&1 &

            echo "Application Started"

          EOF

  auto-destroy:
    if: always()
    needs: [terraform, deploy]
    runs-on: ubuntu-latest

    defaults:
      run:
        working-directory: terraform

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      # Download Terraform state from previous job
      - name: Download Terraform State
        uses: actions/download-artifact@v4
        with:
          name: terraform-state
          path: terraform/

      - name: Configure AWS Credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ap-south-1

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3

      - name: Terraform Init
        run: terraform init

      - name: Show Terraform State
        run: terraform state list || true

      - name: Wait 7 Minutes
        run: |
          echo "Server will stay alive for 7 minutes..."
          sleep 420

      - name: Terraform Destroy
        run: terraform destroy -auto-approve

      - name: Confirm Destroy
        run: terraform state list || true