name: Deploy Employee System

on:
  push:
    branches:
      - typescript_main_teraform_aws_lambda_step_fn

jobs:
  deploy:
    runs-on: ubuntu-latest

    # JOB TIMEOUT
    timeout-minutes: 45

    steps:

      - name: Checkout Source
        uses: actions/checkout@v4

      - name: Setup NodeJS
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3

      - name: Configure AWS Credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ secrets.AWS_REGION }}

      ##################################################
      # LOGIN LAMBDA
      ##################################################

      - name: Install Login Lambda Dependencies
        timeout-minutes: 5
        run: |
          cd lambdas/login
          npm install

      - name: Zip Login Lambda
        timeout-minutes: 2
        run: |
          cd lambdas/login
          zip -r ../../login.zip .

      ##################################################
      # VALIDATE JWT LAMBDA
      ##################################################

      - name: Install Validate JWT Dependencies
        timeout-minutes: 5
        run: |
          cd lambdas/validateJwt
          npm install

      - name: Zip Validate JWT Lambda
        timeout-minutes: 2
        run: |
          cd lambdas/validateJwt
          zip -r ../../validateJwt.zip .

      ##################################################
      # CREATE EMPLOYEE LAMBDA
      ##################################################

      - name: Install Create Employee Dependencies
        timeout-minutes: 5
        run: |
          cd lambdas/createEmployee
          npm install

      - name: Zip Create Employee Lambda
        timeout-minutes: 2
        run: |
          cd lambdas/createEmployee
          zip -r ../../createEmployee.zip .

      ##################################################
      # UPLOAD IMAGE LAMBDA
      ##################################################

      - name: Install Upload Image Dependencies
        timeout-minutes: 5
        run: |
          cd lambdas/uploadImage
          npm install

      - name: Zip Upload Image Lambda
        timeout-minutes: 2
        run: |
          cd lambdas/uploadImage
          zip -r ../../uploadImage.zip .

      ##################################################
      # UPDATE EMPLOYEE LAMBDA
      ##################################################

      - name: Install Update Employee Dependencies
        timeout-minutes: 5
        run: |
          cd lambdas/updateEmployee
          npm install

      - name: Zip Update Employee Lambda
        timeout-minutes: 2
        run: |
          cd lambdas/updateEmployee
          zip -r ../../updateEmployee.zip .

      ##################################################
      # VERIFY FILES
      ##################################################

      - name: Verify ZIP Files
        timeout-minutes: 2
        run: |
          ls -lh

      ##################################################
      # TERRAFORM INIT
      ##################################################

      - name: Terraform Init
        timeout-minutes: 10
        run: |
          cd terraform
          terraform init

      ##################################################
      # TEST MONGODB CONNECTION
      ##################################################

      - name: Test MongoDB Connection
        timeout-minutes: 10
        env:
          MONGO_URI: ${{ secrets.MONGO_URI }}
        run: |

          mkdir mongo-test
          cd mongo-test

          npm init -y

          npm install mongodb

          cat > test.js << 'EOF'
          const { MongoClient } = require('mongodb');

          async function testConnection() {

            try {

              console.log('Connecting to MongoDB...');

              const client = new MongoClient(
                process.env.MONGO_URI,
                {
                  serverSelectionTimeoutMS: 10000,
                  connectTimeoutMS: 10000,
                  socketTimeoutMS: 10000
                }
              );

              await client.connect();

              console.log('MongoDB Connection Successful');

              const db = client.db('demodb');

              const collections =
                await db.listCollections().toArray();

              console.log(
                'Database Connected:',
                db.databaseName
              );

              console.log(
                'Collections:',
                collections.map(c => c.name)
              );

              await client.close();

              process.exit(0);

            } catch (error) {

              console.error(
                'MongoDB Connection Failed'
              );

              console.error(error);

              process.exit(1);
            }
          }

          testConnection();
          EOF

          node test.js

      ##################################################
      # TERRAFORM APPLY
      ##################################################

      - name: Terraform Apply
        timeout-minutes: 20
        env:
          TF_VAR_mongo_url: ${{ secrets.MONGO_URI }}
        run: |
          cd terraform
          terraform apply -auto-approve