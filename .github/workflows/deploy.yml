name: Deploy Lambda

on:
  push:
    branches:
      - typescript_main_teraform_aws_lambda_step

jobs:
  deploy:
    runs-on: ubuntu-latest

    permissions:
      id-token: write
      contents: read

    steps:

      - name: Checkout
        uses: actions/checkout@v4

      #############################################
      # AWS LOGIN
      #############################################

      - name: Configure AWS
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_KEY }}
          aws-region: ap-south-1

      #############################################
      # TERRAFORM
      #############################################

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3

      - name: Terraform Init
        working-directory: infra
        run: terraform init

      - name: Terraform Apply
        working-directory: infra
        run: terraform apply -auto-approve

      #############################################
      # ECR LOGIN
      #############################################

      - name: Login to ECR
        id: ecr
        uses: aws-actions/amazon-ecr-login@v2

      #############################################
      # BUILD DOCKER IMAGE
      #############################################

      - name: Build Image
        run: |
          docker build -t nodemaster .

      - name: Tag Image
        run: |
          docker tag nodemaster:latest \
          ${{ steps.ecr.outputs.registry }}/nodemaster:latest

      - name: Push Image
        run: |
          docker push \
          ${{ steps.ecr.outputs.registry }}/nodemaster:latest