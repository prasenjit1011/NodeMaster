name: Terraform GCP Full Deploy

on:
  push:
    branches:
      - typescript_main_teraform_gcp

  workflow_dispatch:

jobs:

  # =========================
  # 1. BOOTSTRAP JOB
  # =========================
  bootstrap:
    name: Bootstrap Backend
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Authenticate to GCP
        uses: google-github-actions/auth@v2
        with:
          credentials_json: ${{ secrets.GCP_CREDENTIALS }}

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3

      - name: Terraform Init (Bootstrap)
        run: terraform -chdir=bootstrap init

      - name: Terraform Apply (Bootstrap)
        run: terraform -chdir=bootstrap apply -auto-approve
        env:
          TF_VAR_project_id: ${{ secrets.GCP_PROJECT_ID }}
          TF_VAR_region: us-central1
          TF_VAR_mongo_uri: ${{ secrets.MONGO_URI }}

  # =========================
  # 2. DEPLOY INFRA
  # =========================
  deploy:
    name: Deploy Infrastructure
    runs-on: ubuntu-latest
    needs: bootstrap

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Authenticate to GCP
        uses: google-github-actions/auth@v2
        with:
          credentials_json: ${{ secrets.GCP_CREDENTIALS }}

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3

      - name: Terraform Init
        run: terraform -chdir=terraform init -migrate-state

      - name: Terraform Plan
        run: terraform -chdir=terraform plan
        env:
          TF_VAR_project_id: ${{ secrets.GCP_PROJECT_ID }}
          TF_VAR_region: us-central1
          TF_VAR_mongo_uri: ${{ secrets.MONGO_URI }}

      - name: Terraform Apply
        run: terraform -chdir=terraform apply -auto-approve
        env:
          TF_VAR_project_id: ${{ secrets.GCP_PROJECT_ID }}
          TF_VAR_region: us-central1
          TF_VAR_mongo_uri: ${{ secrets.MONGO_URI }}

  # =========================
  # 3. AUTO DESTROY (5 MIN)
  # =========================
  destroy:
    name: Auto-Destroy Resources After 5 Minutes
    runs-on: ubuntu-latest
    needs: deploy

    steps:
      - name: Wait 5 minutes before destruction
        run: |
          echo "⏱️  Waiting 5 minutes before destroying resources to avoid charges..."
          echo "Destruction will occur at: $(date -u -d '+300 seconds' +'%Y-%m-%d %H:%M:%S UTC')"
          sleep 300

      - name: Checkout code
        uses: actions/checkout@v4

      - name: Authenticate to GCP
        uses: google-github-actions/auth@v2
        with:
          credentials_json: ${{ secrets.GCP_CREDENTIALS }}

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3

      - name: Terraform Init (Terraform folder)
        run: terraform -chdir=terraform init -migrate-state

      - name: Terraform Destroy (Main Infrastructure)
        run: terraform -chdir=terraform destroy -auto-approve -lock=false
        env:
          TF_VAR_project_id: ${{ secrets.GCP_PROJECT_ID }}
          TF_VAR_region: us-central1
          TF_VAR_mongo_uri: ${{ secrets.MONGO_URI }}

      - name: Terraform Init (Bootstrap folder)
        run: terraform -chdir=bootstrap init -migrate-state

      - name: Terraform Destroy (Bootstrap Resources)
        run: terraform -chdir=bootstrap destroy -auto-approve -lock=false
        env:
          TF_VAR_project_id: ${{ secrets.GCP_PROJECT_ID }}
          TF_VAR_region: us-central1

      - name: Destruction Complete
        run: |
          echo "✅ ALL RESOURCES DESTROYED SUCCESSFULLY"
          echo "Completed at: $(date -u +'%Y-%m-%d %H:%M:%S UTC')"
          echo "💰 Charges have stopped accruing"